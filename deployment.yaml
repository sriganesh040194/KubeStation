# ── Ephemeral / stateless mode ────────────────────────────────────────────────
# Use this when you don't need persistent state across pod restarts.
# /data exists inside the container but is lost on restart.
# Suitable for: one-off debugging, CI runners, short-lived sessions.
#
# For persistent sessions (saved kubeconfig, docker/gh login, scripts),
# use statefulset.yaml instead.
# ─────────────────────────────────────────────────────────────────────────────
# ── ServiceAccount ────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubestation-sa
  namespace: default
  labels:
    app: kubestation

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubestation
  namespace: default
  labels:
    app: kubestation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubestation
  template:
    metadata:
      labels:
        app: kubestation
    spec:
      # ── Node placement — update workload label to match your node pool ──────
      # nodeSelector:
      #   workload: <your-node-label>
      # tolerations:
      #   - key: workload
      #     operator: Equal
      #     value: <your-node-label>
      #     effect: NoSchedule
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 300
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 300
        - key: node.kubernetes.io/memory-pressure
          operator: Exists
          effect: NoSchedule

      serviceAccountName: kubestation-sa

      securityContext:
        runAsUser: 0
        runAsNonRoot: false
        fsGroup: 0

      volumes:
        # kubeconfig injected from Secret — entrypoint copies to /data/kube/config
        - name: kube-secret
          secret:
            secretName: kubeconfig
            defaultMode: 0600
        # /data is ephemeral — lost on pod restart
        - name: data
          emptyDir: {}

      containers:
        - name: kubestation
          image: ghcr.io/sriganesh040194/kubestation/cli-tools:latest
          imagePullPolicy: Always

          env:
            - name: KUBECONFIG
              value: /data/kube/config
            - name: HOME
              value: /root
            # ── AAD auth method — change to: spn | msi | workloadidentity | devicecode
            - name: AUTH_METHOD
              value: "azurecli"
            # ── SPN auth — populate via Secret if using AUTH_METHOD=spn ───────
            # - name: AZURE_CLIENT_ID
            #   valueFrom:
            #     secretKeyRef:
            #       name: kubestation-spn
            #       key: client-id
            # - name: AZURE_CLIENT_SECRET
            #   valueFrom:
            #     secretKeyRef:
            #       name: kubestation-spn
            #       key: client-secret
            # - name: AZURE_TENANT_ID
            #   valueFrom:
            #     secretKeyRef:
            #       name: kubestation-spn
            #       key: tenant-id
            - name: ACCEPT_EULA
              value: "Y"

          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi

          volumeMounts:
            # kubeconfig secret (read-only) — entrypoint copies to /data/kube/
            - name: kube-secret
              mountPath: /etc/kube
              readOnly: true
            - name: data
              mountPath: /data

          livenessProbe:
            exec:
              command: [ "bash", "-c", "ps aux | grep tail | grep -v grep" ]
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3

          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: true

      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
